// ==============================================
// AUTOEXEC - elemikelo
// Archivo principal que carga toda la configuración
// ==============================================

// Cargar módulos de configuración
exec video
exec core
exec crosshair
exec viewmodel
exec radar
exec audio
exec movement
exec binds
exec utilities

// Alias para configuraciones externas
alias normal "exec autoexec"
alias practice "exec practicacs2"
alias kz "exec kz"
alias hud "exec dynamic_hud"

// Restaurar binds importantes (evita que KZ o servidores los cambien)
bind "mouse4" "slot8"   // Flash
bind "mouse5" "slot7"   // Smoke
bind "r" "+reload"

// Mensaje de confirmación
echo "================================"
echo "AUTOEXEC CARGADO - elemikelo"
echo "================================"

host_writeconfig
