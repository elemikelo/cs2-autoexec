//Modo foto | Photo mode
cl_drawhud 1
r_dof_override 0
r_dof_override_near_blurry 0

// Modo foto toggle | Photo mode toggle
alias photo_enable "cl_drawhud 0; r_dof_override 1; r_dof_override_near_blurry 50; viewmodel_offset_y 2; viewmodel_offset_x 0; viewmodel_offset_z 1; r_fullscreen_gamma 3; play sounds/ui/coin_pickup_01.vsnd_c; log_color Console 00FF00FF; echo MODO FOTO ACTIVADO | PHOTO MODE ENABLED; alias photo photo_disable"
alias photo_disable "cl_drawhud 1; r_dof_override 0; r_dof_override_near_blurry 0; viewmodel_offset_y 0; viewmodel_offset_x 2.5; viewmodel_offset_z -1.5; r_fullscreen_gamma 2.2; play sounds/ui/coin_pickup_01.vsnd_c; log_color Console FF0000FF; echo MODO FOTO DESACTIVADO | PHOTO MODE DISABLED; alias photo photo_enable"
alias photo photo_enable                              // ◄ Al escribir Photo en la consola Activa o desactiva el modo foto, el cual quita el HUD y Desenfoca el fondo | When writing photo on the active console or deactivates the photo mode, which removes the HUD and broken the background


