// ==============================================
// AUTOEXEC - elemikelo
// Archivo principal que carga toda la configuración
// ==============================================

// Cargar módulos de configuración
exec video       // Configuración visual y competitiva
exec core        // Configuración básica del cliente
exec crosshair   // Configuración de la mira
exec viewmodel   // Posición del arma
exec radar       // Configuración del radar
exec audio       // Configuración de sonido
exec movement    // Configuración de movimiento
exec binds       // Controles principales
exec utilities   // Funciones especiales

// Alias para configuraciones externas
alias practice "exec practicacs2"    // Ejecuta la cfg de práctica
alias kz "exec kz"                   // Activa configuración KZ
alias hud "exec dynamic_hud"         // Activa HUD dinámico

echo "================================"
echo "AUTOEXEC CARGADO - elemikelo"
echo "================================"

host_writeconfig   // Guarda la configuración actual
