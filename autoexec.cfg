// ==========================================================
// CS2 AUTOEXEC
// Author: elemikelo
// Competitive / Movement / KZ Config
// ==========================================================


// ==========================================================
// CORE SETTINGS
// ==========================================================

con_enable 1                         // Habilita la consola
fps_max 0                            // Sin límite de FPS
rate 1000000                         // Rate máximo
cl_allow_multi_input_binds 1         // Permite múltiples binds
r_show_build_info 0                  // Oculta build info abajo izquierda



// ==========================================================
// CROSSHAIR
// ==========================================================

cl_crosshairstyle 4                  // Mira clásica
cl_crosshairsize 2                   // Tamaño
cl_crosshairthickness 0.5            // Grosor
cl_crosshairgap -3                   // Espacio central
cl_crosshairdot 0                    // Sin punto central
cl_crosshair_drawoutline 0           // Sin contorno
cl_crosshairalpha 255                // Opacidad
cl_crosshairusealpha 1               // Usa alpha
cl_crosshaircolor 1                  // Color verde
cl_crosshair_t 0                     // Forma normal
cl_crosshair_recoil 0                // No seguir recoil
cl_crosshair_sniper_width 1          // Mira sniper



// ==========================================================
// VIEWMODEL
// ==========================================================

viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 2
viewmodel_offset_z -1.5
viewmodel_presetpos 0



// ==========================================================
// RADAR
// ==========================================================

cl_radar_scale 0.30
cl_radar_rotate 1
cl_radar_always_centered 0
cl_radar_icon_scale_min 0.77
cl_hud_radar_scale 0.99



// ==========================================================
// MOUSE
// ==========================================================

sensitivity 1
zoom_sensitivity_ratio 1
m_pitch 0.022
m_yaw 0.022
mouse_inverty 0



// ==========================================================
// AUDIO
// ==========================================================

volume 1
snd_mixahead 0.025
snd_musicvolume 0
snd_menumusic_volume 0
snd_roundstart_volume 0
snd_roundend_volume 0
snd_mapobjective_volume 0.01
snd_tensecondwarning_volume 0.04
snd_deathcamera_volume 0
snd_mvp_volume 0.3
snd_toolvolume 0.4



// ==========================================================
// MOVEMENT
// ==========================================================

bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "space" "+jump"
bind "ctrl" "+duck"



// ==========================================================
// ARMAS
// ==========================================================

bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "q" "lastinv"



// ==========================================================
// GRANADAS
// ==========================================================

bind "mouse5" "slot7"      // Flash
bind "mouse4" "slot8"      // Smoke
bind "4" "slot6"           // HE
bind "5" "slot10"          // Molotov
bind "7" "slot9"           // Decoy



// ==========================================================
// COMBATE
// ==========================================================

bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "f" "+lookatweapon"
bind "shift" "+sprint"
bind "tab" "+showscores"



// ==========================================================
// COMUNICACIÓN
// ==========================================================

bind "y" "messagemode"
bind "u" "messagemode2"
bind "x" "player_ping"
bind "c" "+voicerecord"



// ==========================================================
// CONSOLA
// ==========================================================

bind "`" "toggleconsole"



// ==========================================================
// COMPRA
// ==========================================================

bind "," "buy vest"
bind "b" "buymenu"



// ==========================================================
// CLUTCH MUTE
// ==========================================================

alias clutchmute "voice_modenable_toggle; play buttons/blip1"
bind "ralt" "clutchmute"



// ==========================================================
// C4 QUICK DROP
// ==========================================================

alias +c4 "slot5"
alias -c4 "drop"
bind "j" "+c4"



// ==========================================================
// PHOTO MODE
// ==========================================================

alias photo_enable "cl_drawhud 0; r_dof_override 1; r_dof_override_near_blurry 50; viewmodel_offset_y 2; viewmodel_offset_x 0; viewmodel_offset_z 1; r_fullscreen_gamma 3; play sounds/ui/coin_pickup_01.vsnd_c; echo PHOTO MODE ENABLED; alias photo photo_disable"

alias photo_disable "cl_drawhud 1; r_dof_override 0; r_dof_override_near_blurry 0; viewmodel_offset_x 2.5; viewmodel_offset_y 2; viewmodel_offset_z -1.5; r_fullscreen_gamma 2.2; play sounds/ui/coin_pickup_01.vsnd_c; echo PHOTO MODE DISABLED; alias photo photo_enable"

alias photo photo_enable



// ==========================================================
// CONFIGS EXTERNAS
// ==========================================================

alias practice "exec practicacs2"    // Ejecuta cfg práctica
alias kz "exec kz"                   // Ejecuta cfg KZ
alias hud "exec dynamic_hud"         // Ejecuta cfg HUD



// ==========================================================
// CONTROL DE VOLUMEN
// ==========================================================

bind "F4" "volume 0.1; snd_restart; snd_toolvolume 0.4; play buttons/blip1"
bind "F5" "volume 0.5; snd_restart; snd_toolvolume 0.4; play buttons/blip1"
bind "F6" "volume 1; snd_restart; snd_toolvolume 0.4; play buttons/blip1"



// ==========================================================
// CONFIRMACIÓN
// ==========================================================

echo "AUTOEXEC LOADED SUCCESSFULLY"

host_writeconfig
