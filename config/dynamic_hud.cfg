// ======================================= CFG DEFINITIVA ========================================
// DYNAMIC HUD TOGGLE (F8) - Morado y Rosa

// HUD Colors
alias hud_purple "cl_hud_color 5"  // 5 = Morado en CS2
alias hud_pink   "cl_hud_color 11" // 11 = Rosa en CS2

// Dynamic HUD States
alias hud_state_pink "bind MOUSE1 +dynamic_pink; hud_pink" 
alias hud_state_purple "bind MOUSE1 +dynamic_purple; hud_purple" 

// Dynamic Shooting Behavior
alias +dynamic_pink "hud_pink; +attack"
alias -dynamic_pink "hud_purple; -attack" 

alias +dynamic_purple "hud_purple; +attack" 
alias -dynamic_purple "hud_pink; -attack" 

// Toggle Function (F8 to Switch HUD Color)
alias hud_to_pink "hud_state_pink; bind F8 hud_to_purple; echo [HUD] Modo: Disparo Morado -> Reposo Rosa"
alias hud_to_purple "hud_state_purple; bind F8 hud_to_pink; echo [HUD] Modo: Disparo Rosa -> Reposo Morado"

// Initial State (Set Default HUD Color)
hud_to_purple