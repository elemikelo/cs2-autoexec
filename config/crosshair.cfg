// ==============================================
// CONFIGURACIÓN DE MIRA
// ==============================================

cl_crosshaircolor 4      // Activa el modo de color personalizado para el crosshair (1 verde, 2 amarillo, 3 azul, 4 personalizado)

cl_crosshaircolor_r 0    // Valor rojo (0 = sin rojo)

cl_crosshaircolor_g 255  // Valor verde (255 = verde máximo)

cl_crosshaircolor_b 255  // Valor azul (255 = azul máximo)

cl_crosshairsize 2           // Tamaño de la mira

cl_crosshairthickness 0.5    // Grosor de las líneas

cl_crosshairgap -3           // Espacio central entre líneas

cl_crosshairdot 0            // Desactiva punto central

cl_crosshair_drawoutline 0   // Desactiva contorno

cl_crosshairalpha 255        // Opacidad máxima

cl_crosshairusealpha 1       // Permite transparencia

cl_crosshair_t 0             // Forma clásica

cl_crosshair_recoil 0        // No mostrar recoil en la mira

cl_crosshair_sniper_width 1  // Grosor de la mira sniper
