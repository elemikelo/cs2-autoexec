// ======================================= CFG PRACTICE CS2 =======================================

echo PRACTICE MODE ACTIVADO

// ================= CUCHILLOS =================

alias "+vknifes" "slot2; slot3"                     // Cambia rápidamente al cuchillo
alias "-vknifes" "drop; exec CFG/knifes"            // Suelta el cuchillo y ejecuta el cfg de cuchillos

// ================= BINDS PRACTICE =================

bind "rctrl" "+vknifes"                             // CTRL derecho → cambiar cuchillos
bind "p" "noclip"                                   // P → volar por el mapa (noclip)
bind "l" "incrementvar host_timescale 1 10 8"        // L → aumenta la velocidad del juego
bind "i" "sv_rethrow_last_grenade"                   // I → repetir última granada lanzada
bind "{" "bot_place"                                 // { → colocar un bot donde miras
bind "." "bot_add_ct"                                // . → añadir bot CT
bind "," "bot_add_t"                                 // , → añadir bot T
bind "downarrow" "toggle bot_crouch"                 // ↓ → bots agachados ON/OFF
bind "uparrow" "toggle bot_mimic"                    // ↑ → bots imitan tus movimientos
bind "rightarrow" "ent_fire !self sethealth 100"     // → → restaurar vida a 100
bind "-" "toggle sv_grenade_trajectory_prac_pipreview" // - → activar/desactivar trayectoria granadas

alias exit_practice "exec autoexec"                  // salir del modo practice y volver a tu config

// ================= PERMITIR COMANDOS =================

sv_cheats 1                                         // permitir comandos de práctica

// ================= BOTS =================

bot_stop 1                                          // los bots no se mueven
bot_dont_shoot 1                                    // los bots no disparan
bot_kick                                            // expulsar bots actuales
bot_knives_only                                     // bots solo usan cuchillo
bot_mimic_yaw_offset 0                              // orientación cuando imitan

// ================= RESPAWN =================

mp_respawn_on_death_ct 1                            // respawn infinito CT
mp_respawn_on_death_t 1                             // respawn infinito T

// ================= ECONOMÍA =================

mp_items_prohibited 0                               // permitir todos los items
mp_drop_knife_enable 1                              // permitir tirar cuchillo
mp_autokick 0                                       // desactivar autokick
mp_autoteambalance 0                                // desactivar autobalance
mp_limitteams 0                                     // sin límite de jugadores por equipo
mp_buytime 99999                                    // tiempo infinito para comprar
mp_buy_anywhere 1                                   // comprar en cualquier lugar
mp_maxmoney 60000                                   // dinero máximo
mp_startmoney 60000                                 // empezar con dinero máximo

// ================= RONDAS =================

mp_c4timer 9999                                     // bomba tarda mucho en explotar
mp_roundtime 60                                     // rondas de 60 minutos
mp_roundtime_defuse 60                              // ronda defuse 60 minutos
mp_roundtime_hostage 60                             // ronda hostage 60 minutos
mp_freezetime 0                                     // sin freeze time
mp_warmup_end                                       // terminar warmup
mp_restartgame 1                                    // reiniciar partida

// ================= GRANADAS =================

sv_grenade_trajectory_prac_pipreview 1               // mostrar trayectoria granadas
sv_grenade_trajectory_prac_trailtime 10              // duración trayectoria
sv_grenade_trajectory_time_spectator 10              // trayectoria visible espectador

// ================= VISUAL =================

sv_alltalk 1                                        // todos pueden hablar
sv_showimpacts 2                                    // mostrar impactos de balas
sv_autobunnyhopping 1                               // bunnyhop automático
sv_infinite_ammo 2                                  // munición infinita con recarga
sv_pure 0                                           // desactivar restricciones

// ================= UTILIDAD =================

ammo_grenade_limit_total 10                         // máximo 10 granadas

mp_ct_default_grenades "weapon_hegrenade weapon_flashbang weapon_smokegrenade weapon_molotov"
mp_t_default_grenades "weapon_hegrenade weapon_flashbang weapon_smokegrenade weapon_molotov"

mp_ct_default_primary "weapon_m4a1"
mp_t_default_primary "weapon_ak47"

mp_free_armor 2                                     // chaleco + casco gratis

// ================= SONIDO =================

play \sounds\ui\competitive_accept_beep.vsnd_c

// ================= CHULETA PRACTICE =================

alias practice_help "
echo ================= PRACTICE MODE =================;
echo RCTRL - Cambiar cuchillos;
echo P - Noclip (volar);
echo L - Cambiar velocidad del juego;
echo I - Repetir ultima granada;
echo { - Colocar bot donde miras;
echo . - Añadir bot CT;
echo , - Añadir bot T;
echo FLECHA ABAJO - Bots agachados;
echo FLECHA ARRIBA - Bots imitan movimientos;
echo FLECHA DERECHA - Curarte;
echo - - Activar / desactivar trayectoria granadas;
echo ===============================================;
"

// tecla para abrir la chuleta
bind "F8" "practice_help"

practice_help

// ================= DECORACIÓN CONSOLA =================

log_color Console FF00FFFF
echo PRACTICE CFG CARGADA
log_color Console 00FFFFFF