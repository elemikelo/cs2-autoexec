// ==============================================
// CONFIGURACIÓN BÁSICA DEL CLIENTE
// ==============================================

con_enable 1                 // Activa la consola del juego

fps_max 0                    // Elimina límite de FPS

rate 1000000                 // Rate máximo de red para servidores

cl_allow_multi_input_binds 1 // Permite múltiples acciones en una misma tecla

r_show_build_info 0          // Oculta texto de build abajo a la izquierda


cl_updaterate 128            // Frecuencia de actualización del servidor

cl_cmdrate 128               // Frecuencia de comandos enviados al servidor

cl_interp 0                  // Interpolación mínima

cl_interp_ratio 1            // Ratio de interpolación