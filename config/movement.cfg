// ==============================================
// CONFIGURACIÓN DE MOVIMIENTO
// ==============================================

bind "mwheelup" "+jump"      // Saltar con rueda arriba (bhop)

bind "mwheeldown" "+jump"    // Saltar con rueda abajo (bhop)

bind "space" "+jump"         // Salto normal

bind "ctrl" "+duck"          // Agacharse
