// ==============================================
// FUNCIONES ESPECIALES
// ==============================================


// MODO FOTO

cl_drawhud 1
r_dof_override 0
r_dof_override_near_blurry 0

alias photo_enable "
cl_drawhud 0;
r_dof_override 1;
r_dof_override_near_blurry 50;
viewmodel_offset_y 2;
viewmodel_offset_x 0;
viewmodel_offset_z 1;
r_fullscreen_gamma 3;
play sounds/ui/coin_pickup_01.vsnd_c;
echo MODO FOTO ACTIVADO;
alias photo photo_disable
"

alias photo_disable "
cl_drawhud 1;
r_dof_override 0;
r_dof_override_near_blurry 0;
viewmodel_offset_x 2.5;
viewmodel_offset_y 2;
viewmodel_offset_z -1.5;
r_fullscreen_gamma 2.2;
play sounds/ui/coin_pickup_01.vsnd_c;
echo MODO FOTO DESACTIVADO;
alias photo photo_enable
"

alias photo photo_enable



// CLUTCH MUTE

alias clutchmute "voice_modenable_toggle; play buttons/blip1"

bind "ralt" "clutchmute"



// DROP RÁPIDO DE C4

alias +c4 "slot5"

alias -c4 "drop"

bind "j" "+c4"



// CONTROL DE VOLUMEN

bind "F4" "volume 0.1; snd_restart; snd_toolvolume 0.4; play buttons/blip1"

bind "F5" "volume 0.5; snd_restart; snd_toolvolume 0.4; play buttons/blip1"

bind "F6" "volume 1; snd_restart; snd_toolvolume 0.4; play buttons/blip1"

// =========================
// SMOKE CAMERA
// =========================

bind "O" "+smokezoom"

// =========================
// GRENADE PRACTICE
// =========================

bind "K" "sv_rethrow_last_grenade"


