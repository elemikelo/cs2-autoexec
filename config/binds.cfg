// ==============================================
// CONTROLES PRINCIPALES
// ==============================================

bind "`" "toggleconsole"     // Abrir consola

bind "1" "slot1"             // Arma principal

bind "2" "slot2"             // Pistola

bind "3" "slot3"             // Cuchillo

bind "mouse1" "+attack"      // Disparar

bind "mouse2" "+attack2"     // Disparo secundario

bind "r" "+reload"           // Recargar

bind "e" "+use"              // Usar / plantar / defuse

bind "g" "drop"              // Soltar arma

bind "f" "+lookatweapon"     // Inspeccionar arma

bind "shift" "+sprint"       // Caminar

bind "tab" "+showscores"     // Ver marcador

bind "y" "messagemode"       // Chat global

bind "u" "messagemode2"      // Chat de equipo

bind "x" "player_ping"       // Sistema de ping

bind "c" "+voicerecord"      // Push to talk

bind "," "buy vest"          // Comprar chaleco

bind "b" "buymenu"           // Abrir menú de compra

bind "capslock" "toggle cl_radar_scale 0.3 0.8" // Cambiar tamaño radar

bind "F10" "say ¯\_(ツ)_/¯"   // Mensaje troll

bind "mouse4" "slot7"   // Flashbang

bind "mouse5" "slot8"   // Smoke
