// ==============================================
// CONFIGURACIÓN DE AUDIO
// ==============================================

volume 1                     // Volumen general

snd_mixahead 0.025           // Latencia de audio baja

snd_musicvolume 0            // Música del juego desactivada

snd_menumusic_volume 0       // Música del menú desactivada

snd_roundstart_volume 0      // Sonido inicio ronda desactivado

snd_roundend_volume 0        // Sonido fin ronda desactivado

snd_mapobjective_volume 0.01 // Sonido de objetivo bajo

snd_tensecondwarning_volume 0.04 // Aviso bomba bajo

snd_deathcamera_volume 0     // Cámara de muerte sin sonido

snd_mvp_volume 0.32          // Música MVP reducida

snd_toolvolume 0.4           // Volumen sonidos interfaz


snd_headphone_eq 1              // Mejora audio para auriculares

snd_spatialize_lerp 0.5         // Mejor posicionamiento sonido

snd_steamaudio_enable_perspective_correction 1