// ==============================================
// POSICIÓN DEL ARMA (VIEWMODEL)
// ==============================================

viewmodel_fov 68             // FOV máximo del arma

viewmodel_offset_x 2.5       // Posición horizontal del arma

viewmodel_offset_y 2         // Posición lateral

viewmodel_offset_z -1.5      // Altura del arma

viewmodel_presetpos 0        // Permite usar offsets personalizados
